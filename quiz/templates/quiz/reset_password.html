{% extends 'quiz/base.html' %}
{% load static %}
{% block title %}Reset Password{% endblock %}

{% block content %}
<div class="auth-wrapper" style="padding: 60px 0; background-color: var(--bg-light);">
    <div class="container">
        <div style="max-width: 450px; margin: 0 auto; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);">
            <div style="text-align: center; margin-bottom: 30px;">
                <h2 style="color: var(--text-dark); font-weight: 700;">Reset Password</h2>
                <p style="color: var(--text-muted); font-size: 14px;">Enter the OTP you received and a new password.</p>
            </div>
            
            {% if messages %}
            <div class="messages mb-4">
                {% for message in messages %}
                <div class="alert {% if message.tags %}alert-{{ message.tags }}{% endif %}" style="padding: 10px; border-radius: 6px; margin-bottom: 10px; font-size: 14px; background-color: #f8d7da; color: #721c24;">
                    {{ message }}
                </div>
                {% endfor %}
            </div>
            {% endif %}

            <form method="POST">
                {% csrf_token %}
                <div style="margin-bottom: 20px;">
                    <label for="otp" style="display: block; font-size: 14px; font-weight: 600; color: var(--text-dark); margin-bottom: 8px;">OTP</label>
                    <input type="text" name="otp" id="otp" required style="width: 100%; padding: 12px; border: 1px solid var(--border-color); border-radius: 6px; font-size: 15px;">
                </div>
                <div style="margin-bottom: 20px;">
                    <label for="new_password" style="display: block; font-size: 14px; font-weight: 600; color: var(--text-dark); margin-bottom: 8px;">New Password</label>
                    <input type="password" name="new_password" id="new_password" required style="width: 100%; padding: 12px; border: 1px solid var(--border-color); border-radius: 6px; font-size: 15px;">
                </div>
                <div style="margin-bottom: 20px;">
                    <label for="confirm_password" style="display: block; font-size: 14px; font-weight: 600; color: var(--text-dark); margin-bottom: 8px;">Confirm Password</label>
                    <input type="password" name="confirm_password" id="confirm_password" required style="width: 100%; padding: 12px; border: 1px solid var(--border-color); border-radius: 6px; font-size: 15px;">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; padding: 12px; font-size: 16px; font-weight: 600;">Reset Password</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
